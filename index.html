<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLT Hero Mask Prototypes</title>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@200,300,400,500,600,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      color: rgba(255, 255, 255, 0.9);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
    }
    h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      gap: 24px;
      justify-content: center;
    }
    .links a {
      display: block;
      padding: 20px 40px;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.2s, border-color 0.2s;
    }
    .links a:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CLT Hero Mask</h1>
    <p>Fluid-reveal hero section prototypes</p>
    <div class="links">
      <a href="/v1/">V1 — Courtyard</a>
      <a href="/v2/">V2 — Waterfront</a>
    </div>
  </div>
</body>
</html>
