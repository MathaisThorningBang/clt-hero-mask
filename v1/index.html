<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLT Denmark — V1 Courtyard</title>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@200,300,400,500,600,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: 'Clash Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      color: rgba(255, 255, 255, 0.9);
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      cursor: crosshair;
    }

    .hero canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.2) 0%,
        rgba(0, 0, 0, 0.05) 40%,
        rgba(0, 0, 0, 0.1) 60%,
        rgba(0, 0, 0, 0.45) 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    .nav {
      position: absolute;
      top: 30px;
      left: 32px;
      right: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .nav-logo {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      line-height: 0.9;
      opacity: 0;
    }

    .nav-logo .bold {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .nav-logo .regular {
      font-size: 25px;
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav-links a {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 0.9;
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      transition: opacity 0.2s;
      opacity: 0;
    }

    .nav-links a:hover {
      opacity: 0.7;
    }

    .nav-contact {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #000;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 0.9;
      color: #fff;
      text-decoration: none;
      transition: background 0.2s;
    }

    .nav-contact:hover {
      background: #222;
    }

    .nav-contact svg {
      width: 18px;
      height: 18px;
    }

    .hero-headline {
      position: absolute;
      bottom: 0;
      left: 32px;
      right: 32px;
      z-index: 3;
      pointer-events: none;
    }

    .hero-headline h1 {
      font-size: clamp(60px, 9.7vw, 140px);
      font-weight: 600;
      line-height: 0.9;
      letter-spacing: -0.03em;
      max-width: 1220px;
      padding-bottom: 40px;
    }

    .hero-headline .line {
      display: block;
      overflow: hidden;
      padding-bottom: 0.15em;
    }

    .hero-headline .line-inner {
      display: block;
      transform: translateY(120%);
    }

    .version-nav {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .version-nav a,
    .version-nav span {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(255,255,255,0.4);
      transition: opacity 0.2s;
    }

    .version-nav span {
      color: rgba(255,255,255,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.5);
    }

    .version-nav a:hover {
      color: rgba(255,255,255,0.7);
    }

    @media (max-width: 768px) {
      .nav {
        top: 16px;
        left: 16px;
        right: 16px;
      }

      .nav-logo .bold {
        font-size: 24px;
      }

      .nav-logo .regular {
        font-size: 19px;
      }

      .nav-links {
        gap: 16px;
      }

      .nav-links a {
        font-size: 14px;
      }

      .nav-links .nav-contact {
        padding: 10px 12px;
        font-size: 14px;
      }

      .hero-headline {
        left: 16px;
        right: 16px;
      }

      .hero-headline h1 {
        font-size: clamp(36px, 10vw, 60px);
        padding-bottom: 24px;
      }

      .version-nav {
        top: 16px;
      }
    }

    @media (max-width: 480px) {
      .nav-links a:not(.nav-contact) {
        display: none;
      }

      .hero-headline h1 {
        font-size: clamp(32px, 10vw, 48px);
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <canvas id="fluidCanvas"></canvas>
    <div class="hero-gradient"></div>

    <nav class="nav">
      <div class="nav-logo">
        <span class="bold">CLT</span>
        <span class="regular">Denmark</span>
      </div>
      <div class="nav-links">
        <a href="#">Material</a>
        <a href="#">Projects</a>
        <a href="#">Company</a>
        <a href="#">News & Press</a>
        <a href="#" class="nav-contact">
          Contact
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </a>
      </div>
    </nav>

    <div class="hero-headline">
      <h1>
        <span class="line"><span class="line-inner">Building for a</span></span>
        <span class="line"><span class="line-inner">sustainable future</span></span>
      </h1>
    </div>
  </section>


  <script src="/fluid-reveal.js"></script>
  <script>
    const canvas = document.getElementById('fluidCanvas');

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
    }

    resize();
    window.addEventListener('resize', resize);

    const reveal = new FluidReveal(canvas, 'images/finish.png', 'images/skeleton.jpg', {
      simResolution: 128,
      dyeResolution: 512,
      densityDissipation: 0.97,
      velocityDissipation: 0.98,
      splatRadius: 0.02,
      splatForce: 6000,
      curl: 30,
    });

    // GSAP intro animation
    const tl = gsap.timeline({ delay: 0.3 });

    tl.to('.nav-logo', {
      opacity: 1,
      duration: 0.8,
      ease: 'power2.out',
    });

    tl.to('.nav-links a', {
      opacity: 1,
      duration: 0.6,
      stagger: 0.08,
      ease: 'power2.out',
    }, '-=0.4');

    tl.to('.hero-headline .line-inner', {
      y: 0,
      duration: 1,
      stagger: 0.12,
      ease: 'power3.out',
    }, '-=0.3');
  </script>

</body>
</html>
